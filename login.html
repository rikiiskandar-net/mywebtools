<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Admin Dashboard</title>
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center p-4">
  <div class="card w-full max-w-sm shadow-2xl bg-base-100 border border-base-300">
    <div class="card-body">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-primary">AdminPanel</h1>
        <p class="text-sm text-base-content/70 mt-1">Silakan masuk ke akun Anda</p>
      </div>
      
      <!-- Alert Container -->
      <div id="loginAlert" class="alert alert-error shadow-sm hidden mb-4 py-2 text-sm">
        <span id="loginAlertMessage"></span>
      </div>

      <form id="loginForm" class="space-y-4">
        <div class="form-control">
          <label class="label"><span class="label-text">Email</span></label>
          <input type="email" id="emailInput" placeholder="admin@example.com" class="input input-bordered w-full" required />
        </div>
        
        <div class="form-control">
          <label class="label"><span class="label-text">Password</span></label>
          <input type="password" id="passwordInput" placeholder="••••••••" class="input input-bordered w-full" required />
        </div>
        
        <div class="form-control mt-6">
          <button type="submit" id="loginBtn" class="btn btn-primary w-full">
            Masuk
            <span id="loginSpinner" class="loading loading-spinner hidden"></span>
          </button>
        </div>
      </form>
    </div>
  </div>
  
  <!-- Script Khusus Halaman Ini -->
  <script type="module" src="/src/js/auth.js"></script>
</body>
</html>
