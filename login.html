<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Roboto', sans-serif; }
    h1, h2, h3, h4, h5, .brand-font { font-family: 'Google Sans', sans-serif; }
  </style>
</head>
<body class="bg-zinc-900 text-zinc-100 antialiased h-screen overflow-hidden flex flex-col selection:bg-blue-900 selection:text-blue-200">
  <section class="absolute inset-0 z-50 bg-zinc-900 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-zinc-900 sm:bg-zinc-800 sm:border border-zinc-700 sm:rounded-[24px] p-6 sm:p-10 shadow-2xl relative">
      <div class="text-center mb-8">
        <svg class="w-12 h-12 mx-auto text-zinc-100 mb-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
        <h1 class="text-2xl font-normal brand-font text-zinc-100">Login Admin</h1>
        <p class="text-zinc-400 mt-2 text-sm">Gunakan Akun Sistem Anda</p>
      </div>
      
      <div id="loginAlert" class="hidden bg-red-900/50 text-red-200 border border-red-800 rounded-lg p-3 mb-6 text-sm">
        <span id="loginAlertMessage"></span>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <input type="email" id="emailInput" placeholder="Email" class="w-full bg-transparent border border-zinc-500 rounded-md px-4 py-3 text-zinc-100 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-colors placeholder-zinc-500" required />
        </div>
        <div>
          <input type="password" id="passwordInput" placeholder="Sandi" class="w-full bg-transparent border border-zinc-500 rounded-md px-4 py-3 text-zinc-100 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-colors placeholder-zinc-500" required />
        </div>
        <div class="pt-4 flex justify-between items-center">
          <a href="/register.html" class="text-blue-400 font-medium hover:bg-blue-400/10 px-3 py-2 rounded-md transition-colors text-sm">Buat akun</a>
          <button type="submit" id="loginBtn" class="bg-blue-400 text-zinc-900 font-medium px-6 py-2 rounded-full hover:bg-blue-300 transition-colors flex items-center gap-2">
            <span>Selanjutnya</span>
            <span id="loginSpinner" class="hidden w-4 h-4 border-2 border-zinc-900 border-t-transparent rounded-full animate-spin"></span>
          </button>
        </div>
      </form>
    </div>
  </section>
  <script type="module" src="/src/js/pages/login.js"></script>
</body>
</html>
