<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buat Akun - Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Roboto', sans-serif; }
    h1, h2, h3, h4, h5, .brand-font { font-family: 'Google Sans', sans-serif; }
  </style>
</head>
<body style="visibility: hidden;" class="bg-zinc-900 text-zinc-100 antialiased h-screen overflow-hidden flex flex-col selection:bg-blue-900 selection:text-blue-200">
  <section class="absolute inset-0 z-50 bg-zinc-900 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-zinc-900 sm:bg-zinc-800 sm:border border-zinc-700 sm:rounded-[24px] p-6 sm:p-10 shadow-2xl relative">
      <div class="text-center mb-8">
        <svg class="w-12 h-12 mx-auto text-zinc-100 mb-4" viewBox="0 0 24 24" fill="currentColor"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <h1 class="text-2xl font-normal brand-font text-zinc-100">Buat Akun</h1>
        <p class="text-zinc-400 mt-2 text-sm">Daftarkan diri Anda ke sistem</p>
      </div>
      
      <div id="registerAlert" class="hidden bg-red-900/50 text-red-200 border border-red-800 rounded-lg p-3 mb-6 text-sm">
        <span id="registerAlertMessage"></span>
      </div>
      <div id="registerSuccessAlert" class="hidden bg-green-900/50 text-green-200 border border-green-800 rounded-lg p-3 mb-6 text-sm">
        <span id="registerSuccessMessage"></span>
      </div>

      <form id="registerForm" class="space-y-4">
        <div>
          <input type="text" id="regNameInput" placeholder="Nama Lengkap" class="w-full bg-transparent border border-zinc-500 rounded-md px-4 py-3 text-zinc-100 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-colors placeholder-zinc-500" required />
        </div>
        <div>
          <input type="email" id="regEmailInput" placeholder="Email" class="w-full bg-transparent border border-zinc-500 rounded-md px-4 py-3 text-zinc-100 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-colors placeholder-zinc-500" required />
        </div>
        <div>
          <input type="password" id="regPasswordInput" placeholder="Sandi" class="w-full bg-transparent border border-zinc-500 rounded-md px-4 py-3 text-zinc-100 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-colors placeholder-zinc-500" required minlength="6" />
        </div>
        <div class="pt-4 flex justify-between items-center">
          <a href="/login.html" class="text-blue-400 font-medium hover:bg-blue-400/10 px-3 py-2 rounded-md transition-colors text-sm">Login saja</a>
          <button type="submit" id="registerBtn" class="bg-blue-400 text-zinc-900 font-medium px-6 py-2 rounded-full hover:bg-blue-300 transition-colors flex items-center gap-2">
            <span>Daftar</span>
            <span id="registerSpinner" class="hidden w-4 h-4 border-2 border-zinc-900 border-t-transparent rounded-full animate-spin"></span>
          </button>
        </div>
      </form>
    </div>
  </section>
  <script type="module" src="/src/js/pages/register.js"></script>
</body>
</html>
