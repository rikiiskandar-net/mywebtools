<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Prompt Builder - Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Roboto', sans-serif; }
    h1, h2, h3, h4, h5, .brand-font { font-family: 'Google Sans', sans-serif; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #52525b; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #71717a; }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="visibility: hidden;" class="bg-zinc-900 text-zinc-100 antialiased h-screen overflow-hidden flex flex-col selection:bg-blue-900 selection:text-blue-200">
  <div id="app" class="flex-1 flex flex-col h-full relative">
    
    <!-- Top Navbar MD3 -->
    <header class="h-16 shrink-0 flex items-center justify-between px-2 sm:px-6 border-b border-zinc-800 bg-zinc-900 relative z-20">
      <div class="flex items-center gap-1 sm:gap-4 w-1/4">
        <button id="sidebarToggle" class="p-2 sm:p-3 text-zinc-400 hover:bg-zinc-800 rounded-full transition-colors md:hidden">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>
        <div class="flex items-center gap-2 px-2">
          <h1 class="text-xl sm:text-2xl font-normal brand-font text-zinc-100 hidden sm:block">Admin<span class="text-zinc-400">Panel</span></h1>
        </div>
      </div>

      <div class="flex-1 max-w-2xl px-2">
        <div class="bg-zinc-800 hover:bg-zinc-700 transition-colors rounded-full flex items-center px-4 py-2 sm:py-3 w-full">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-400 mr-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          <input type="text" placeholder="Telusuri data..." class="bg-transparent border-none outline-none text-zinc-100 w-full placeholder-zinc-400 text-sm sm:text-base" />
        </div>
      </div>

      <div class="flex items-center justify-end gap-2 w-1/4">
        <div class="relative">
          <button id="profileDropdownBtn" class="p-1 sm:p-1.5 hover:bg-zinc-800 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-zinc-700">
            <img id="headerUserAvatar" class="w-8 h-8 sm:w-9 sm:h-9 rounded-full ring-1 ring-zinc-700" src="https://ui-avatars.com/api/?name=User&background=1e1e1e&color=fff" alt="Profile" />
          </button>
          <div id="profileDropdownMenu" class="hidden absolute right-0 mt-2 w-72 bg-zinc-800 border border-zinc-700 shadow-2xl rounded-3xl overflow-hidden py-2 z-50">
            <div class="px-6 py-4 border-b border-zinc-700 text-center">
              <img id="headerUserAvatarLarge" class="w-16 h-16 rounded-full mx-auto mb-3" src="https://ui-avatars.com/api/?name=User&background=1e1e1e&color=fff" alt="Profile" />
              <span id="headerUserName" class="block font-medium brand-font text-zinc-100 text-lg">Memuat...</span>
              <span class="block text-sm text-zinc-400 mt-1">Memuat...</span>
            </div>
            <div class="p-2">
              <a href="/settings" class="nav-link flex items-center gap-3 px-4 py-3 hover:bg-zinc-700/50 rounded-full transition-colors text-zinc-300 mx-2">
                <i data-lucide="user" class="w-5 h-5"></i>
                Profil
              </a>
            </div>
            <div class="border-t border-zinc-700 p-2 mt-2">
              <button id="btnGlobalLogout" class="w-full flex items-center justify-center gap-2 px-4 py-3 hover:bg-zinc-700/50 rounded-full transition-colors text-zinc-300">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                Log out
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden relative">
      <!-- Sidebar Navigation -->
      <aside id="sidebar" class="w-64 shrink-0 bg-zinc-900 absolute md:relative inset-y-0 left-0 transform -translate-x-full md:translate-x-0 transition-all duration-300 ease-in-out z-30 pt-4 pb-20 overflow-y-auto border-r border-zinc-800 flex flex-col overflow-x-hidden">
        <div class="px-3 md:px-0 mb-4 border-b border-zinc-800 pb-4 flex items-center justify-between">
          <div class="flex items-center">
            <i data-lucide="command" class="w-6 h-6 text-blue-500 ml-4 shrink-0"></i>
            <h1 class="nav-text text-xl font-normal brand-font text-zinc-100 ml-3 transition-opacity duration-300">Admin<span class="text-zinc-400">Panel</span></h1>
          </div>
          <button id="sidebarDesktopToggle" class="hidden md:flex p-1.5 mr-2 rounded-lg hover:bg-zinc-800 text-zinc-400 transition-colors">
            <i id="sidebarToggleIcon" data-lucide="chevron-left" class="w-5 h-5 transition-transform duration-300"></i>
          </button>
        </div>
        <nav class="flex flex-col gap-1 px-3">
          <a href="/dashboard" class="nav-link flex items-center gap-4 px-4 py-3 rounded-full text-zinc-300 hover:bg-zinc-800 transition-colors">
            <i data-lucide="home" class="w-5 h-5 shrink-0"></i>
            <span class="nav-text font-medium text-sm transition-opacity duration-300 whitespace-nowrap">Beranda</span>
          </a>
          <a href="/users" data-admin-only="true" class="nav-link hidden flex items-center gap-4 px-4 py-3 rounded-full text-zinc-300 hover:bg-zinc-800 transition-colors">
            <i data-lucide="users" class="w-5 h-5 shrink-0"></i>
            <span class="nav-text font-medium text-sm transition-opacity duration-300 whitespace-nowrap">Orang & berbagi</span>
          </a>
          <a href="/tools" class="nav-link flex items-center gap-4 px-4 py-3 rounded-full text-zinc-300 hover:bg-zinc-800 transition-colors">
            <i data-lucide="briefcase" class="w-5 h-5 shrink-0"></i>
            <span class="nav-text font-medium text-sm transition-opacity duration-300 whitespace-nowrap">Alat / Tools</span>
          </a>
        </nav>
      </aside>

      <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-20 hidden md:hidden"></div>
      <!-- Main Content -->
      <main id="mainContent" class="flex-1 overflow-y-auto w-full relative transition-opacity duration-200 ease-in-out opacity-0">
        <div class="px-4 sm:px-8 py-8 md:py-12 max-w-3xl mx-auto space-y-6">
          
          <!-- Back Link -->
          <div>
            <a href="/tools" class="inline-flex items-center text-sm font-medium text-zinc-400 hover:text-zinc-200 transition-colors">
              <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i>
              Kembali ke Tools
            </a>
          </div>

          <!-- Header -->
          <div>
            <h2 class="text-3xl font-normal brand-font text-zinc-100 mb-2 flex items-center gap-3">
              <i data-lucide="sparkles" class="w-8 h-8 text-purple-400"></i>
              Image Prompt Builder
            </h2>
            <p class="text-zinc-400 text-sm">Racik prompt gambar hyper-realistic & sinematik dengan bantuan AI.</p>
          </div>

          <!-- Generator Card -->
          <div class="bg-zinc-800 rounded-[24px] overflow-hidden border border-zinc-700/50 shadow-sm p-6 sm:p-8 space-y-8 relative">
            
            <form id="promptForm" class="space-y-6">
              
              <!-- Kata Dasar -->
              <div>
                <label class="block text-sm font-medium text-zinc-300 mb-2">Ide Dasar / Subjek Utama</label>
                <textarea id="baseIdea" rows="3" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-zinc-100 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none transition-all resize-none" placeholder="Contoh: kedai kopi ramai di Bali saat sore hari..."></textarea>
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <!-- Gaya Visual -->
                <div>
                  <label class="block text-sm font-medium text-zinc-300 mb-2">Gaya Visual</label>
                  <select id="visualStyle" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-zinc-100 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="">(Bebas)</option>
                    <option value="Photorealistic">Photorealistic</option>
                    <option value="Cinematic Movie Still">Cinematic Movie Still</option>
                    <option value="Cyberpunk">Cyberpunk</option>
                    <option value="3D Render (Unreal Engine 5)">3D Render (Unreal Engine 5)</option>
                    <option value="Vintage Film">Vintage Film</option>
                    <option value="Anime">Anime</option>
                  </select>
                </div>

                <!-- Kamera & Lensa -->
                <div>
                  <label class="block text-sm font-medium text-zinc-300 mb-2">Kamera & Lensa</label>
                  <select id="cameraLens" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-zinc-100 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="">(Bebas)</option>
                    <option value="DSLR 85mm Bokeh">DSLR 85mm Bokeh</option>
                    <option value="Wide Angle 16mm">Wide Angle 16mm</option>
                    <option value="Anamorphic Lens">Anamorphic Lens</option>
                    <option value="Drone View">Drone View</option>
                    <option value="Macro Close-Up">Macro Close-Up</option>
                  </select>
                </div>
                
                <!-- Pencahayaan -->
                <div>
                  <label class="block text-sm font-medium text-zinc-300 mb-2">Pencahayaan</label>
                  <select id="lighting" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-zinc-100 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="">(Bebas)</option>
                    <option value="Golden Hour">Golden Hour</option>
                    <option value="Volumetric Sunlight">Volumetric Sunlight</option>
                    <option value="Moody Neon">Moody Neon</option>
                    <option value="Dramatic Studio">Dramatic Studio</option>
                  </select>
                </div>

                <!-- Aspect Ratio -->
                <div>
                  <label class="block text-sm font-medium text-zinc-300 mb-2">Aspect Ratio (Aspek Rasio)</label>
                  <select id="aspectRatio" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-3 text-zinc-100 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="">(Bebas)</option>
                    <option value="16:9 (Landscape)">16:9 (Landscape)</option>
                    <option value="9:16 (Story/Reels)">9:16 (Story/Reels)</option>
                    <option value="1:1 (Square)">1:1 (Square)</option>
                    <option value="21:9 (Ultrawide)">21:9 (Ultrawide)</option>
                  </select>
                </div>
              </div>
              
              <div class="flex gap-4 pt-4">
                <button type="submit" id="btnGenerate" class="flex-1 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white px-6 py-3.5 rounded-full text-sm font-medium transition-all shadow-lg shadow-purple-900/20 flex items-center justify-center gap-2 relative overflow-hidden">
                  <span id="btnText" class="flex items-center gap-2"><i data-lucide="wand-2" class="w-4 h-4"></i> 🪄 Sempurnakan dengan AI</span>
                  <div id="btnSpinner" class="hidden absolute inset-0 flex items-center justify-center bg-zinc-800/80 backdrop-blur-sm">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                  </div>
                </button>
                <button type="button" id="btnReset" class="px-6 py-3.5 rounded-full bg-zinc-900 hover:bg-zinc-700 text-zinc-300 text-sm font-medium transition-colors border border-zinc-700">
                  Reset Input
                </button>
              </div>
            </form>

            <div id="outputSection" class="hidden">
              <hr class="border-zinc-700/50 mb-8" />
              <h3 class="text-sm font-medium text-zinc-300 mb-4 flex items-center gap-2">
                <i data-lucide="terminal" class="w-4 h-4 text-emerald-400"></i>
                Hasil Prompt Master
              </h3>
              
              <div class="relative group">
                <div class="bg-zinc-900 border border-zinc-700 rounded-xl p-5 text-zinc-200 font-mono text-sm leading-relaxed min-h-[100px]" id="resultPrompt">
                </div>
                <button id="btnCopy" class="absolute top-3 right-3 p-2 bg-zinc-800/80 hover:bg-zinc-700 text-zinc-400 hover:text-white rounded-lg transition-colors border border-zinc-700/50 backdrop-blur-sm group-hover:opacity-100 opacity-0 focus:opacity-100" title="Salin Prompt">
                  <i data-lucide="copy" class="w-4 h-4 pointer-events-none"></i>
                </button>
              </div>
            </div>

          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 bg-zinc-800 text-zinc-100 px-4 py-3 rounded-xl shadow-lg border border-zinc-700 flex items-center gap-3 transition-all duration-300 z-50">
    <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center shrink-0">
      <i data-lucide="check" class="w-4 h-4 text-emerald-400"></i>
    </div>
    <span class="text-sm font-medium">Prompt disalin ke clipboard!</span>
  </div>

  <script type="module" src="/src/js/tools/prompt-builder.js"></script>
</body>
</html>
